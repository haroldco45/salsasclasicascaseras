<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salsas Clásicas - Chef Mauricio Marín</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--primary);
        }

        header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
        }

        .subtitle { color: var(--accent); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; }
        h1 { margin: 10px 0; font-size: 2.2rem; color: var(--primary); }

        .search-container {
            max-width: 500px;
            margin: 0 auto 40px;
        }

        #searchInput {
            width: 100%;
            padding: 15px 25px;
            border: none;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            outline: none;
            font-size: 1rem;
        }

        .grid-salsas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-10px); }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .card-content { padding: 20px; }

        .card h3 {
            color: var(--accent);
            margin: 0 0 15px 0;
            font-size: 1.4rem;
            border-bottom: 2px solid #f9f9f9;
            padding-bottom: 10px;
        }

        .card ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .card li {
            padding: 6px 0;
            font-size: 0.95rem;
            color: #555;
            display: flex;
            align-items: center;
        }

        .card li::before {
            content: "•";
            color: var(--accent);
            font-weight: bold;
            margin-right: 10px;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            font-size: 0.85rem;
            color: #888;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<header>
    <div class="subtitle">Recetario Digital</div>
    <h1>Salsas Caseras Clásicas</h1>
    <p>Chef Mauricio Marín</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="¿Qué salsa buscas hoy?" onkeyup="filterSalsas()">
</div>

<main class="grid-salsas" id="salsasList">
    </main>

<footer>
    <p>App desarrollada por Vibras Positivas - Derechos de Autor (3117700431)</p>
</footer>

<script>
    // Se asume que las imágenes están en la misma carpeta que el index.html
    const salsas = [
        { id: 1, nombre: "Aioli de Ajo", img: "aiolideajo.JPG", ing: ["½ taza mayonesa", "2 dientes de ajo picados", "1 cda jugo de limón", "Sal y pimienta"] },
        { id: 2, nombre: "Mostaza y Miel", img: "mostazaymiel.JPG", ing: ["½ taza mayonesa", "2 cdas mostaza Dijon", "2 cdas miel", "1 cda vinagre", "Sal al gusto"] },
        { id: 3, nombre: "Pico de Gallo", img: "picodegallo.JPG", ing: ["4 tomates picados", "½ cebolla picada", "1 jalapeño picado", "Cilantro y lima", "Sal al gusto"] },
        { id: 4, nombre: "Salsa Teriyaki", img: "salsateriyaki.JPG", ing: ["½ taza salsa de soya", "3 cdas azúcar morena", "2 cdas miel", "Ajo y jengibre", "Sésamo"] },
        { id: 5, nombre: "Pesto", img: "pesto.JPG", ing: ["2 tazas albahaca", "½ taza queso parmesano", "½ taza nueces", "2 dientes de ajo", "Aceite de oliva"] },
        { id: 6, nombre: "Tzatziki", img: "tzatziki.JPG", ing: ["1 taza yogur griego", "½ pepino rallado", "Limón y ajo", "Eneldo fresco", "Sal y pimienta"] },
        { id: 7, nombre: "Salsa BBQ", img: "salsabbq.JPG", ing: ["1 taza salsa tomate", "¼ taza azúcar morena", "3 cdas vinagre", "2 cdas miel", "Mostaza"] },
        { id: 8, nombre: "Salsa Alfredo", img: "salsaalfredo.JPG", ing: ["1 taza crema para batir", "½ taza parmesano", "2 dientes de ajo", "2 cdas mantequilla", "Sal y pimienta"] },
        { id: 9, nombre: "Chimichurri", img: "chimichurri.JPG", ing: ["½ taza perejil picado", "¼ taza cilantro picado", "Aceite de oliva", "Ajo y vinagre", "Sal y pimienta"] }
    ];

    function displaySalsas(data) {
        const container = document.getElementById('salsasList');
        container.innerHTML = data.map(s => `
            <div class="card">
                <img src="${s.img}" alt="${s.nombre}" class="card-img" onerror="this.src='https://via.placeholder.com/300x180?text=Salsa+Mauricio'">
                <div class="card-content">
                    <h3>${s.id}. ${s.nombre}</h3>
                    <ul>
                        ${s.ing.map(i => `<li>${i}</li>`).join('')}
                    </ul>
                </div>
            </div>
        `).join('');
    }

    function filterSalsas() {
        const text = document.getElementById('searchInput').value.toLowerCase();
        const filtered = salsas.filter(s => s.nombre.toLowerCase().includes(text));
        displaySalsas(filtered);
    }

    displaySalsas(salsas);
</script>

</body>
</html>

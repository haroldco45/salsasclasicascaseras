<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salsas Clásicas - Chef Mauricio Marín</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--primary);
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 30px;
        }

        h1 { margin: 5px 0; font-size: 1.8rem; }
        .subtitle { color: var(--accent); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        .search-container {
            max-width: 600px;
            margin: 0 auto 30px;
        }

        #searchInput {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            box-sizing: border-box;
        }

        .grid-salsas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); }

        .card h3 {
            color: var(--accent);
            margin-top: 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .card ul {
            list-style: none;
            padding: 0;
        }

        .card li {
            padding: 8px 0;
            border-bottom: 1px solid #fafafa;
            font-size: 0.95rem;
        }

        .card li:last-child { border: none; }

        footer {
            text-align: center;
            margin-top: 50px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

<header>
    <div class="subtitle">Recetario Digital</div>
    <h1>Salsas Caseras Clásicas</h1>
    <p>Chef Mauricio Marín</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Buscar salsa (ej: Pesto, Alfredo...)" onkeyup="filterSalsas()">
</div>

<main class="grid-salsas" id="salsasList">
    </main>

<footer>
    <p>App desarrollada por Vibras Positivas - Derechos de Autor (3117700431)</p>
</footer>

<script>
    const salsas = [
        { id: 1, nombre: "Aioli de Ajo", ingredientes: ["½ taza mayonesa", "2 dientes de ajo, picados", "1 cucharada de jugo de limón", "Sal y pimienta al gusto"] },
        { id: 2, nombre: "Mostaza y Miel", ingredientes: ["½ taza mayonesa", "2 cucharadas de mostaza Dijon", "2 cucharadas de miel", "1 cucharada de vinagre", "Sal al gusto"] },
        { id: 3, nombre: "Pico de Gallo", ingredientes: ["4 tomates, picados", "½ cebolla, picada", "1 jalapeño, picado", "2 cucharadas de cilantro picado", "Jugo de 1 lima", "Sal al gusto"] },
        { id: 4, nombre: "Salsa Teriyaki", ingredientes: ["½ taza de salsa de soya", "3 cucharadas de azúcar morena", "2 cucharadas de miel", "1 cucharada de vinagre", "1 cucharada de sésamo", "Diente de ajo y jengibre picado"] },
        { id: 5, nombre: "Pesto", ingredientes: ["2 tazas de albahaca", "½ taza de queso parmesano", "½ taza de nueces", "2 dientes de ajo", "½ taza de aceite de oliva", "Sal al gusto"] },
        { id: 6, nombre: "Tzatziki", ingredientes: ["1 taza de yogur griego", "½ pepino rallado", "1 cucharada de jugo de limón", "2 dientes de ajo, picados", "2 cucharadas de eneldo fresco", "Sal y pimienta"] },
        { id: 7, nombre: "Salsa BBQ", ingredientes: ["1 taza de salsa de tomate", "¼ taza de azúcar morena", "3 cucharadas de vinagre", "2 cucharadas de miel", "1 cucharada de mostaza", "Sal al gusto"] },
        { id: 8, nombre: "Salsa Alfredo", ingredientes: ["1 taza de crema para batir", "½ taza de queso parmesano rallado", "2 dientes de ajo, picados", "2 cucharadas de mantequilla", "Sal y pimienta al gusto"] },
        { id: 9, nombre: "Chimichurri", ingredientes: ["½ taza de perejil, picado", "¼ taza de cilantro, picado", "½ taza de aceite de oliva", "2 dientes de ajo picados", "2 cucharadas de vinagre", "Sal y pimienta al gusto"] }
    ];

    function displaySalsas(data) {
        const container = document.getElementById('salsasList');
        container.innerHTML = data.map(salsa => `
            <div class="card">
                <h3><span>${salsa.id}.</span> ${salsa.nombre}</h3>
                <ul>
                    ${salsa.ingredientes.map(ing => `<li>${ing}</li>`).join('')}
                </ul>
            </div>
        `).join('');
    }

    function filterSalsas() {
        const text = document.getElementById('searchInput').value.toLowerCase();
        const filtered = salsas.filter(s => s.nombre.toLowerCase().includes(text));
        displaySalsas(filtered);
    }

    // Inicializar
    displaySalsas(salsas);
</script>

</body>
</html>
